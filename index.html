<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch') || Object.getOwnPropertyDescriptor(Object.getPrototypeOf(window), 'fetch');
          if (desc && (!desc.writable || desc.set === undefined)) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: function() {
                return originalFetch.apply(this, arguments);
              },
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error("Error patching window.fetch descriptor:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethio App Hub | Ethiopian Android App Directory</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
